<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <title>過去の日記</title>
</head>
<body>
<nav class="nav">
    <a th:href="@{/home}" class="nav-title">📔 My Daily Memo</a>
    <div class="nav-links">
        <a th:href="@{/home}" class="btn btn-secondary">ホーム</a>
    </div>
</nav>

<div class="container">
    <h1>過去の日記</h1>

    <div class="filter-bar">
        <form method="get" th:action="@{/history}" style="display:flex; gap:8px; align-items:center;">
            <select name="year">
                <option th:each="y : ${years}" th:value="${y}" th:text="|${y}年|" th:selected="${y == selectedYear}"></option>
            </select>
            <select name="month">
                <option th:each="m : ${months}" th:value="${m}" th:text="|${m}月|" th:selected="${m == selectedMonth}"></option>
            </select>
            <button type="submit" class="btn btn-primary">表示</button>
        </form>
        <button id="favorite" class="btn btn-secondary">お気に入りのみ表示</button>
    </div>

    <div class="diary-list">
        <a th:each="diary : ${diaries}"
           th:href="@{/diary/{id}(id=${diary.id})}"
           class="diary-card">
            <div>
                <p class="diary-date" th:text="${#temporals.format(diary.createdAt, 'yyyy年MM月dd日')}"></p>
                <p class="diary-title" th:text="${diary.title}"></p>
            </div>
            <i class="fa-regular fa-star star-btn"></i>
        </a>
    </div>
</div>

<script>
    document.querySelectorAll(".star-btn").forEach(star => {
        const diaryId = star.closest("a").getAttribute("href");

        if (localStorage.getItem("star-" + diaryId) === "true") {
            star.classList.remove("fa-regular");
            star.classList.add("fa-solid");
        }

        star.addEventListener("click", (event) => {
            event.stopPropagation();
            event.preventDefault();
            star.classList.toggle("fa-regular");
            star.classList.toggle("fa-solid");
            const isFavorite = star.classList.contains("fa-solid");
            localStorage.setItem("star-" + diaryId, isFavorite);
        });
    });

    const btn = document.getElementById("favorite");
    btn.addEventListener("click", () => {
        const showOnlyFavorite = btn.textContent === "お気に入りのみ表示";
        btn.textContent = showOnlyFavorite ? "すべて表示" : "お気に入りのみ表示";

        document.querySelectorAll(".diary-card").forEach(card => {
            const diaryId = card.getAttribute("href");
            const isFavorite = localStorage.getItem("star-" + diaryId) === "true";
            card.style.display = (showOnlyFavorite && !isFavorite) ? "none" : "flex";
        });
    });
</script>
</body>
</html>
