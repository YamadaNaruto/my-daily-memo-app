<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ホーム</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="nav">
    <span class="nav-title">📔 My Daily Memo</span>
    <div class="nav-links">
        <a th:href="@{/history}" class="btn btn-secondary">過去の日記</a>
    </div>
</nav>

<div class="container">
    <h1 th:text="|${today} の日記|"></h1>

    <div th:if="${todayDiary != null}">
        <div class="today-content" th:text="${todayDiary.content}"></div>
        <img th:if="${todayDiary.imagePath != null}"
             th:src="@{${'/'+todayDiary.imagePath}}"
             alt="その日の写真"
             class="detail-image">
    </div>

    <div th:if="${todayDiary == null}">
        <div class="form-card">
            <form th:action="@{/upload}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">タイトル</label>
                    <input type="text" name="title" id="title" placeholder="今日のタイトル">
                </div>
                <div class="form-group">
                    <label for="content">本文</label>
                    <textarea name="content" id="content" placeholder="今日はどんな一日でしたか？"></textarea>
                </div>
                <div class="form-group">
                    <label for="image">写真を追加する</label>
                    <input type="file" id="image" name="image">
                </div>
                <div class="form-actions">
                    <button type="button" id="saveBtn" class="btn btn-secondary">一時保存</button>
                    <input type="submit" value="保存する" class="btn btn-primary">
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/push.js}"></script>
<script>
    subscribePush();

    const content = document.getElementById("content");
    const title = document.getElementById("title");

    if (content && title) {
        const date = new Date();
        const prev_date = localStorage.getItem("date") || "";
        if (date.toDateString() === prev_date) {
            content.value = localStorage.getItem("content") || "";
            title.value = localStorage.getItem("title") || "";
        } else {
            content.value = "";
            title.value = "";
        }
    }

    const saveBtn = document.getElementById("saveBtn");
    if (saveBtn) {
        saveBtn.addEventListener("click", () => {
            const date = new Date();
            localStorage.setItem("content", content.value);
            localStorage.setItem("title", title.value);
            localStorage.setItem("date", date.toDateString());
        });
    }
</script>
</body>
</html>
