<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
</head>
<body>
<form action="/register" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    ユーザ名を設定してください<input type="text" name="username">
    パスワードを設定してください<input type="password" name="password">
  <input type="submit" value="登録">
</form>
</body>
</html>
